name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0). Leave empty to build without publishing.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.0-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          fi

      - name: Go unit tests
        run: go test ./internal/...

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Go package check
        run: go test ./...

  build:
    name: Build ${{ matrix.asset_name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            wails_platform: windows/amd64
            asset_name: stegsolve-go-windows-amd64.exe
            wails_extra_args: '-webview2 embed'

          - os: macos-13
            goos: darwin
            goarch: amd64
            wails_platform: darwin/amd64
            asset_name: stegsolve-go-darwin-amd64.zip
            wails_extra_args: ''

          - os: macos-latest
            goos: darwin
            goarch: arm64
            wails_platform: darwin/arm64
            asset_name: stegsolve-go-darwin-arm64.zip
            wails_extra_args: ''

          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            wails_platform: linux/amd64
            asset_name: stegsolve-go-linux-amd64.tar.gz
            wails_extra_args: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          # Ubuntu 24.04+ often ships webkit2gtk 4.1 only; prefer 4.0 when available.
          if apt-cache show libwebkit2gtk-4.0-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
            echo "WAILS_TAGS=" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
            echo "WAILS_TAGS=webkit2_41" >> "$GITHUB_ENV"
          fi

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build
        shell: bash
        env:
          WAILS_PLATFORM: ${{ matrix.wails_platform }}
          WAILS_EXTRA: ${{ matrix.wails_extra_args }}
          ASSET_NAME: ${{ matrix.asset_name }}
          TARGET_OS: ${{ matrix.goos }}
        run: |
          set -euo pipefail
          BUILD_CMD=(wails build -clean -trimpath -platform "${WAILS_PLATFORM}")
          if [[ -n "${WAILS_TAGS:-}" ]]; then
            BUILD_CMD+=(-tags "${WAILS_TAGS}")
          fi
          # shellcheck disable=SC2206
          if [[ -n "${WAILS_EXTRA}" ]]; then
            EXTRA_ARR=(${WAILS_EXTRA})
            BUILD_CMD+=("${EXTRA_ARR[@]}")
          fi
          printf 'Running:'; printf ' %q' "${BUILD_CMD[@]}"; echo
          "${BUILD_CMD[@]}"
          mkdir -p dist
          case "${TARGET_OS}" in
            windows)
              src="build/bin/stegsolve-go.exe"
              if [[ ! -f "$src" ]]; then
                src="$(find build/bin -name '*.exe' -type f | head -n1)"
              fi
              cp "$src" "dist/${ASSET_NAME}"
              ;;
            darwin)
              app="build/bin/stegsolve-go.app"
              if [[ ! -d "$app" ]]; then
                app="$(find build/bin -name '*.app' -type d | head -n1)"
              fi
              (
                cd "$(dirname "$app")"
                zip -qry "${GITHUB_WORKSPACE}/dist/${ASSET_NAME}" "$(basename "$app")"
              )
              ;;
            linux)
              bin="build/bin/stegsolve-go"
              if [[ ! -f "$bin" ]]; then
                bin="$(find build/bin -type f -perm -111 ! -name '*.so' | head -n1)"
              fi
              tar -C "$(dirname "$bin")" -czf "dist/${ASSET_NAME}" "$(basename "$bin")"
              ;;
          esac
          ls -lh dist/

      - name: Checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi
          cat "${{ matrix.asset_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f | sort && ls -lh release-assets

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          body: |
            ## StegSolve Go ${{ steps.meta.outputs.tag }}

            跨平台桌面隐写分析工具（Wails v2 + React/TypeScript）。

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `stegsolve-go-windows-amd64.exe` |
            | macOS Apple Silicon | `stegsolve-go-darwin-arm64.zip` |
            | macOS Intel | `stegsolve-go-darwin-amd64.zip` |
            | Linux x64 | `stegsolve-go-linux-amd64.tar.gz` |

            各文件附带 `.sha256` 校验。

            ### 说明

            - Windows：便携 EXE，优先系统 WebView2，缺失时使用内嵌引导器
            - macOS：解压后运行 `.app`（若遇隔离提示，可在「系统设置 → 隐私与安全性」中允许）
            - Linux：需要 WebKitGTK（如 `libwebkit2gtk`）运行时

            单图 ≤ 5000 万像素；分析使用非预乘 RGBA8。
          files: |
            release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
